title: 'Formatting as Care: Building Trust Through Empathetic Communication'
summary: >-
  The concept of 'formatting as care' emphasizes that communication design, particularly in care
  settings, is an act of compassion and inclusion, respecting individual needs and fostering
  dignity. Neglecting this care, conversely, erodes trust.
insights:
  - >-
    Formatting as care means designing communication to respect individual needs (e.g., visual
    impairments, cognitive differences), empower participation, and foster dignity through
    accessibility and clarity.
  - >-
    Examples of formatting as care include speaking slowly with simple language, using plain English
    and clear layouts in writing, employing visuals to explain complex ideas, and utilizing
    assistive technologies.
  - >-
    Effective formatting in care settings improves quality by reducing misunderstandings, builds
    trust between caregivers and individuals, and supports autonomy by enabling informed choices.
  - >-
    The erosion of trust in care settings is often caused by neglecting care in communication,
    leading to misunderstandings and a lack of perceived respect.
