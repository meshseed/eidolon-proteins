title: 'Formatting as Care: Building Trust and Avoiding its Erosion'
summary: >-
  Formatting as care emphasizes making information accessible and respectful to foster trust,
  particularly in care settings. Conversely, poor communication, inconsistency, lack of
  transparency, disrespect, systemic failures, and past negative experiences erode trust.
insights:
  - >-
    Formatting as care means designing communication that respects individual needs, empowers
    understanding, and fosters dignity.
  - >-
    Examples of formatting as care include using simple language, clear layouts, visual aids, and
    assistive technologies.
  - >-
    Effective formatting in care improves quality, builds trust, and supports autonomy by enabling
    informed choices.
  - >-
    Neglecting care in communication, through jargon, vagueness, or lack of listening, abandons
    trust.
  - >-
    Inconsistency, lack of transparency, disrespect, bias, systemic failures, and past negative
    experiences are key trust eroders.
  - >-
    The erosion of trust leads to feelings of dismissal, confusion, suspicion, unsafety, and
    neglect.
