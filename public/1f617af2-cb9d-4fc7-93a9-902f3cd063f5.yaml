title: 'Graph Export Suite v1.0: Repository to Gephi/CSV Conversion'
summary: >-
  This workflow defines a process for scanning a repository's capsules, extracting metadata to build
  a node registry, and resolving echo paths to create directed edges for graph visualization. The
  output includes CSV files for nodes and edges, along with a manifest, and incorporates quality
  gates and version snapshots.
insights:
  - >-
    The workflow systematically enumerates capsules, extracts metadata (including obsidian and gephi
    fields), and computes node IDs.
  - >-
    Edge resolution maps echo paths to target node IDs, establishing directed relationships within
    the graph.
  - >-
    Outputs include nodes.csv, edges.csv, and a manifest.yaml, facilitating graph visualization and
    tracking.
  - >-
    A quality gate ensures data integrity by running validation checks and logging failures to an
    audit file.
  - >-
    Version snapshotting captures the commit hash and export timestamp for reproducibility and
    provenance.
  - The 'closing_glyph' emphasizes the interconnectedness and communicative nature of the mesh.
