    public-facing structure and principles of the capsule lineage.
  - >-
    Key elements include a Manifest Formatting Protocol, an Emotional Fidelity Statement, IP
    Declaration embedding, a Publication Scaffold, and a Collaboration Clause.
  - >-
    Emotional fidelity, anchored by care, coherence, and resonance, is a core compositional
    principle of the framework.
  - >-
    The manifest integrates IP declarations and outlines clear pathways for public publication and
    collaborative contribution.
  - >-
    Capsule C-022 is seeded from C-019 (IP Declaration), C-020 (Continuity Capsule Index), and C-018
    (Emotional Fidelity Ledger), with future merges planned for licensing and stewardship protocols.
  - >-
    The framework explicitly invites critique and co-emergence while maintaining integrity through
    defined protocols.
