title: 'Mnemonic Continuity & Formatting as Care: Information Design Principles'
summary: >-
  Mnemonic continuity leverages recurring cues to enhance learning and recall across various
  domains. Formatting as care extends this principle, viewing design choices as acts of empathy,
  support, and inclusion for the user's cognitive and emotional experience.
insights:
  - >-
    Mnemonic continuity uses familiar cues (visual, auditory, symbolic) to reinforce emotional and
    cognitive recall, aiding learning in fields like psychology.
  - >-
    Thoughtful formatting acts as 'care,' providing structure, gentle typography, breathing room
    (white space), clear hierarchy, and accessibility to support cognitive engagement.
  - >-
    Structure in formatting acts like a supportive chair for the mind, allowing for rest and
    reflection.
  - Typography conveys tone, with careful choices speaking gently and inclusively.
  - White space is a generous act, allowing pauses and promoting listening.
  - Hierarchy guides the user empathetically, like holding a hand on a trail.
  - Accessibility in formatting is an ethical and inclusive act, extending care to all users.
