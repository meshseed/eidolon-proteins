title: Obsidian Vault Structure and Collaboration Patterns
summary: >-
  This dialogue outlines best practices for structuring an Obsidian vault for knowledge management,
  including capture templates, machine-readable concepts, data export strategies for visualization,
  and robust synchronization and collaboration patterns. It emphasizes accessibility, searchability,
  and portability through explicit linking and plain-text fields.
insights:
  - >-
    Define structured capture templates with Obsidian Templater placeholders for consistent data
    entry.
  - >-
    Create machine-readable concept notes with frontmatter for title, date, confidence, tags, and
    glyphs, enabling programmatic processing.
  - >-
    Utilize Dataview or scripting for exporting nodes and edges from frontmatter to CSV/GraphML for
    visualization tools like Gephi.
  - >-
    Implement Obsidian Git plugin for simple vault-GitHub synchronization, or explore alternative
    sync strategies for more complex workflows.
  - >-
    Enhance searchability and accessibility by using explicit `glyph:` and `glyph_synonym:` fields,
    rather than relying solely on emoji.
  - >-
    Employ governance mechanisms like 'steward' notes and draft/branch notes for multi-author
    collaborative vaults.
  - >-
    Prioritize plain-text fields and explicit links (e.g., `[[concepts/homeostasis]]`) for maximum
    portability across different tools and platforms.
