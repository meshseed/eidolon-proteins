title: 'Self-Attention in Sequence Transduction: Complexity, Parallelization, and Path Length'
summary: >-
  Self-attention layers offer computational advantages over recurrent layers in sequence
  transduction by enabling parallelization and reducing path lengths for long-range dependencies.
  While generally faster than recurrent layers for typical sentence representations, their
  computational complexity can be managed for very long sequences by restricting attention to a
  neighborhood.
insights:
  - >-
    Self-attention layers connect all positions in a sequence with constant sequential operations,
    unlike recurrent layers which require O(n).
  - >-
    Self-attention is computationally faster than recurrent layers when sequence length (n) is less
    than representation dimensionality (d).
  - >-
    Restricting self-attention to a local neighborhood can improve performance for very long
    sequences, albeit increasing maximum path length.
  - >-
    Convolutional layers require multiple stacked layers to connect all positions, increasing path
    lengths compared to self-attention.
  - >-
    Separable convolutions offer reduced complexity but even with maximum kernel width, are
    comparable to a self-attention plus feed-forward layer combination.
  - >-
    Self-attention may lead to more interpretable models by allowing inspection of attention
    distributions.
