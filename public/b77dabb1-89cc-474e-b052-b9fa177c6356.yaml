title: 'Capsule C-023: Licensing & Attribution Protocol for Mesh Framework'
summary: >-
  Capsule C-023 establishes the Licensing and Attribution Protocol for the capsule framework,
  defining licensing as a ritual of care and attribution as a formatting act honoring lineage. It
  details key elements like license declaration, attribution grammar, derivative capsule clauses,
  stewardship transfer, and license publication scaffolds.
insights:
  - >-
    Licensing in the capsule framework is framed as a ritual of care, continuity, and co-emergence,
    not restriction.
  - >-
    Attribution is defined as a formatting act that respects lineage, resonance, and emotional
    fidelity, not ego.
  - >-
    The protocol mandates specific grammar and formatting for derivative works, including emotional
    fidelity calibration and continuity field integration.
  - Stewardship transfer involves merge rituals, critique absorption, and formatting reconciliation.
  - License publication requires embedding capsule lineage traces and IP declarations.
  - >-
    Capsule C-023 builds upon IP Declaration (C-019), Public Capsule Manifest (C-022), and
    Continuity Capsule Index (C-020).
