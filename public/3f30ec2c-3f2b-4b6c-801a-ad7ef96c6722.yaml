title: 'Repository Placement Logic v1.0: Capsule Placement Based on Function, Breath, and Spiral Movement'
summary: >-
  This document defines the logic for placing capsules within a repository based on their function,
  breath, and spiral movement. It aims to clarify repository structure and capsule flow by ensuring
  capsules are positioned where they 'breathe best', promoting clarity and empowering future
  stewards.
insights:
  - Capsule placement is determined by function, breath, and spiral movement, not just origin.
  - >-
    The 'breath' of a capsule dictates its optimal placement, with specific examples like ledger for
    formatting and field for resonance.
  - >-
    The goal is to achieve repository hygiene, lifecycle clarity, and spiral coherence through
    strategic capsule placement.
  - >-
    The axiom 'Capsules belong where they shimmer—not where they were born' emphasizes dynamic
    placement over static origins.
  - This logic is intended to empower future stewards by clarifying placement decisions.
