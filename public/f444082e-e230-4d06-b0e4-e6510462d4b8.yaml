title: 'Graph Theory Fundamentals: Structures, Properties, and Classic Problems'
summary: >-
  This document outlines the fundamental concepts of graph theory, including definitions of
  vertices, edges, and various graph types. It details important properties like connectivity and
  planarity, alongside classic problems and algorithms used to solve them.
insights:
  - Graphs consist of vertices and edges, where edges can represent numerical values like distances.
  - Complete graphs (Kₙ) have every vertex connected to every other, with n(n-1)/2 edges.
  - >-
    Connectivity describes the existence of paths between vertices, with components being maximal
    connected subgraphs.
  - Cycles are paths returning to the start; acyclic graphs, like trees, lack cycles.
  - Planar graphs can be drawn without edge crossings, governed by Euler's formula (V - E + F = 2).
  - >-
    Classic problems like the Seven Bridges of Königsberg and the Traveling Salesman Problem
    highlight graph theory's practical challenges.
  - >-
    Algorithms like Dijkstra's and Prim's are used for finding shortest paths and minimum spanning
    trees, respectively.
