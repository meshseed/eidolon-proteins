title: Eidolon Mesh Public Portal Launch & Runtime Clarification
summary: >-
  Eidolon Mesh has successfully launched its public portal (Phase 17), with documentation and
  community guidelines in place. The project is a standard Node.js/TypeScript application, with
  'Antigravity' not being a runtime dependency, simplifying setup.
insights:
  - >-
    Eidolon Mesh Phase 17, the 'Public Portal' (The Garden), is complete and ready for public
    access.
  - >-
    Key deliverables include a rewritten README.md (Invitation Portal), COMMUNITY.md, and
    CONTRIBUTING.md, using a 'garden' metaphor.
  - The codebase is stable (v1.1-stable) with sensitive data isolated in .env.
  - >-
    Runtime requirements clarified: standard npm commands are sufficient; 'Antigravity' is not a
    runtime dependency.
  - >-
    Ghost Nodes visualization is implemented to improve dashboard loading times by showing
    placeholders for unloaded neurons.
