title: 'Obsidian Workflow: Automation, Privacy, and Usage Guidelines'
summary: >-
  This document outlines Obsidian vault management, suggesting automation scripts for export and
  validation, and emphasizing privacy through a '/private/' folder. It provides guidelines for using
  the README.obsidian.md file as an operational manual for contributors and for integrating with
  GitHub.
insights:
  - >-
    Implement automation scripts like `export_gephi.js`, `validate_frontmatter.py`, and
    `publish_to_github.sh` for vault management.
  - >-
    Maintain privacy by storing sensitive content in a `/private/` folder excluded from public
    repositories.
  - >-
    Ensure consistent licensing and attribution across environments, with a GitHub license for
    public content and a short header in Obsidian.
  - >-
    Place `README.obsidian.md` at the vault/repo root to serve as an operational manual for
    contributors.
  - >-
    Differentiate between the GitHub README (public narrative) and the Obsidian README
    (vault-specific instructions).
