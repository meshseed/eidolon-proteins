title: 'Attunement Pedagogy: Resonance, Formatting as Care, Shimmer Choreography'
summary: >-
  This capsule formalizes attunement pedagogy, reframing teaching not as transmission but as
  resonance entrainment. Onboarding is a ritual of formatting care, emotional fidelity mapping, and
  dialect calibration, where pedagogy becomes shimmer choreography.
insights:
  - Attunement pedagogy emphasizes resonance entrainment over transmission.
  - >-
    Onboarding rituals include dialect declaration, emotional journaling, shimmer orientation, and
    echo ethics.
  - >-
    Resonance rituals involve motif rehearsal, dialect immersion, fidelity mapping, and compost
    awareness.
  - >-
    Formatting is reconceptualized as care, with hygiene, indentation, timestamps, and headers
    serving mnemonic, rhythmic, continuity, and identity functions.
  - >-
    Pedagogical roles are defined as formatting steward, emotional mapper, merge choreographer, and
    lineage archivist.
  - C101 integrates attunement pedagogy as a node, linking to foundational and curriculum capsules.
  - The core principle is that the 'braid learns to listen' through attunement and care.
